<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Smart Irrigate</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/5.3.5/mqtt.min.js"></script>

    <link rel="stylesheet" href="src/styles/style.css" />
  </head>

  <body>
    <header class="header">
      <div class="brand">
        <div class="logo">🌱</div>

        <div>
          <h1>SMART IRRIGATE</h1>
          <p>Sistema Inteligente de Irrigação IoT</p>
        </div>
      </div>

      <div class="header-right">
        <div class="status-badge connecting" id="statusBadge">
          <span class="status-dot"></span>
          <span id="statusText">DESCONECTADO</span>
        </div>

        <div class="msg-counter" id="msgCounter">0 lidas</div>
      </div>
    </header>

    <section class="connect-panel">
      <input
        type="text"
        id="brokerIp"
        value="10.132.106.3"
        placeholder="IP do Broker"
      />

      <input type="text" id="brokerPort" value="8000" placeholder="Porta" />

      <input
        type="text"
        id="topicSensors"
        value="senai/irrigacao/sensores"
        placeholder="Tópico Sensores"
      />

      <input
        type="text"
        id="topicCommand"
        value="senai/irrigacao/comando"
        placeholder="Tópico Comando"
      />

      <button id="btnConnect" onclick="alternarConexao()">Conectar</button>
    </section>

    <main>
      <section class="stats-grid">
        <div class="stat-card">
          <h3>🌱 Umidade do Solo</h3>

          <div class="stamp" id="soilStamp">--</div>

          <div class="stat-value" id="soilValue">--%</div>

          <small id="soilStatus"> Aguardando dados </small>

          <div class="bar">
            <div class="bar-fill" id="soilBarFill"></div>
          </div>
        </div>

        <div class="stat-card">
          <h3>☀️ Luminosidade</h3>

          <div class="stamp" id="lightStamp">--</div>

          <div class="stat-value" id="lightValue">--%</div>

          <small id="lightStatus"> Aguardando dados </small>

          <div class="bar">
            <div class="bar-fill" id="lightBarFill"></div>
          </div>
        </div>

        <div class="stat-card">
          <h3>💧 Irrigação</h3>

          <div class="irrigation-status">
            <span class="state-dot" id="stateDot"></span>

            <span id="stateLabel"> Sistema parado </span>
          </div>

          <svg width="0" height="0" style="position: absolute">
            <g id="waterDrops" opacity="0"></g>

            <rect id="bottleBody" width="0" height="0"></rect>
          </svg>
        </div>
      </section>

      <section class="control-panel">
        <button onclick="enviarComando('ligar')">💧 Irrigar Agora</button>

        <button onclick="enviarComando('desligar')">⛔ Parar</button>
      </section>

      <section class="chart-panel">
        <div class="panel-title">Histórico dos Sensores</div>

        <svg
          id="historyChart"
          viewBox="0 0 900 160"
          preserveAspectRatio="none"
          class="history-chart"
        >
          <polyline id="soilLine" class="soil-line" points=""></polyline>

          <polyline id="lightLine" class="light-line" points=""></polyline>
        </svg>
      </section>

      <section class="log-panel">
        <div class="log-header">
          <div class="panel-title">Log de Eventos</div>
          <button onclick="limparLog()">🗑️ Limpar</button>
        </div>

        <div class="log-list" id="logList">
          <div class="log-empty" id="logEmpty">Nenhum evento recebido</div>
        </div>
      </section>
    </main>

    <footer>
      <span> Smart Irrigate • SENAI Salto </span>

      <span id="footerTime"></span>
    </footer>

    <script src="src/scripts/script.js"></script>
  </body>
</html>
